version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "weekly"
    # Only open PRs for security updates, not routine version bumps.
    # Major version bumps (React 18->19, Vite 6->8, etc.) break the build
    # and require manual testing.
    open-pull-requests-limit: 5
    groups:
      # Group minor/patch updates together to reduce PR noise
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5