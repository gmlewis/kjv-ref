name: on-push-or-pr

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun (attempt 1)
        id: setup-bun-1
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (10s)
        if: steps.setup-bun-1.outcome == 'failure'
        run: sleep 10

      - name: Setup Bun (attempt 2)
        id: setup-bun-2
        if: steps.setup-bun-1.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (20s)
        if: steps.setup-bun-2.outcome == 'failure'
        run: sleep 20

      - name: Setup Bun (attempt 3)
        id: setup-bun-3
        if: steps.setup-bun-2.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Typecheck and build
        run: bun run build

      - name: Unit tests
        run: bun run test:run

  e2e:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun (attempt 1)
        id: setup-bun-1
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (10s)
        if: steps.setup-bun-1.outcome == 'failure'
        run: sleep 10

      - name: Setup Bun (attempt 2)
        id: setup-bun-2
        if: steps.setup-bun-1.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (20s)
        if: steps.setup-bun-2.outcome == 'failure'
        run: sleep 20

      - name: Setup Bun (attempt 3)
        id: setup-bun-3
        if: steps.setup-bun-2.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install chromium

      - name: E2E tests
        run: bun run e2e