name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun (attempt 1)
        id: setup-bun-1
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (10s)
        if: steps.setup-bun-1.outcome == 'failure'
        run: sleep 10

      - name: Setup Bun (attempt 2)
        id: setup-bun-2
        if: steps.setup-bun-1.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
        continue-on-error: true

      - name: Wait before retry (20s)
        if: steps.setup-bun-2.outcome == 'failure'
        run: sleep 20

      - name: Setup Bun (attempt 3)
        id: setup-bun-3
        if: steps.setup-bun-2.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true