<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KJV Ref</title>
  <script type="text/javascript">
    // GitHub Pages SPA fallback.
    // When a deep link (e.g. /kjv-ref/books/Genesis/1) is refreshed, GitHub Pages
    // serves this 404.html. We capture the original path and redirect the browser
    // to the app root, passing the intended route via the query string. The main
    // app (index.html) then restores the path with history.replaceState.
    // Pattern from https://github.com/rafgraph/spa-github-pages
    var segmentCount = 1; // '/kjv-ref' is one segment below the domain root
    var l = window.location;
    var redirectUrl = l.protocol + '//' + l.host + l.pathname
      .split('/').slice(0, 1 + segmentCount).join('/') + '/?/'
      + l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~')
      + (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '')
      + l.hash;
    document.write('<meta http-equiv="refresh" content="0; url=' + redirectUrl + '">');
  </script>
</head>
<body>
  <p>Redirecting to KJV Ref…</p>
</body>
</html>
